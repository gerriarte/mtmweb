
<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTM | Marca Tu Marca - Agencia Creativa</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mtm-theme');
          var root = document.documentElement;
          if (t === 'light') root.classList.remove('dark');
          else root.classList.add('dark');
        } catch (e) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = { darkMode: 'class' };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
        }
        body {
            font-family: 'Space+Grotesk', sans-serif;
            overflow-x: hidden;
        }
        .font-sync { font-family: 'Syncopate', sans-serif; }
        /* Titulares: Oriole (cuerpo y cajas de texto siguen con Space Grotesk) */
        .font-headline {
            font-family: 'Oriole', system-ui, sans-serif;
        }
        /* Interletrado Oriole (titulares): +50 % más de separación sobre la regla anterior */
        .font-headline.tracking-tighter {
            letter-spacing: -0.02em !important; /* antes -0.04em → +50 % aire */
        }
        .font-headline.tracking-tight {
            letter-spacing: -0.01em !important; /* antes -0.02em → +50 % aire */
        }
        .font-headline.tracking-widest {
            letter-spacing: 0.18em !important; /* antes 0.12em × 1.5 */
        }
        .font-headline:not(.tracking-tighter):not(.tracking-tight):not(.tracking-widest) {
            letter-spacing: 0.03em; /* antes 0.02em × 1.5 */
        }
        input, textarea, select {
            font-family: 'Space Grotesk', sans-serif;
        }
        ::-webkit-scrollbar { width: 6px; }
        html:not(.dark) ::-webkit-scrollbar-track { background: #fafafa; }
        html:not(.dark) ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
        html:not(.dark) ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
        html.dark ::-webkit-scrollbar-track { background: #050505; }
        html.dark ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        html.dark ::-webkit-scrollbar-thumb:hover { background: #555; }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        html:not(.dark) .glass-panel {
            background: rgba(255, 255, 255, 0.92);
            border: 1px solid rgba(24, 24, 27, 0.08);
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        }

        .text-gradient {
            background: linear-gradient(to right, #ffffff, #1FCDD2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        html:not(.dark) .text-gradient {
            background: linear-gradient(to right, #18181b, #0d9488);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .cursor-blob {
            pointer-events: none;
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(31, 205, 210, 0.1) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            z-index: 0;
            filter: blur(40px);
            transform: translate(-50%, -50%);
            transition: opacity 0.5s ease;
        }

        /* Efectos de Interacción Global */
        a, button, .interactive {
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            outline: none;
        }

        /* Glow sutil en hover */
        a:hover, .interactive:hover {
            filter: drop-shadow(0 0 8px rgba(31, 205, 210, 0.4));
        }

        /* Botones específicos */
        button:not(:disabled):hover {
            filter: drop-shadow(0 0 12px rgba(31, 205, 210, 0.3));
        }

        button:active, a:active {
            transform: scale(0.98);
        }

        /* Mejoras en inputs para mantener el estilo */
        input:focus, textarea:focus, select:focus {
            border-color: #1FCDD2 !important;
            box-shadow: 0 0 15px rgba(31, 205, 210, 0.1);
        }
    </style>
<script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",

    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",

    "react": "https://esm.sh/react@^19.2.3",
    "framer-motion": "https://esm.sh/framer-motion@^12.23.26"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
<body class="min-h-screen bg-zinc-50 text-zinc-900 antialiased transition-colors duration-300 dark:bg-[#050505] dark:text-white">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
